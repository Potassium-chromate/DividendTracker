name: Docker Image CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'DividendTracker/frontend/**'  # Trigger only when files in this directory change
      - '.github/workflows/frontend-ci.yml' # Trigger when this workflow file changes

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          # Sets the build context to the frontend directory
          context: DividendTracker/frontend
          # Points to the Dockerfile inside that directory
          file: DividendTracker/frontend/Dockerfile
          push: true
          tags: ｜
            ${{ secrets.DOCKERHUB_USERNAME }}/dividendtracker-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/dividendtracker-frontend:${{ github.sha }}
