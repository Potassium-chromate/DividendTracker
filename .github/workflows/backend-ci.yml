name: Docker Image CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'DividendTracker/backend/**'  # Trigger only when files in this directory change
      - '.github/workflows/backend-ci.yml' # Trigger when this workflow file changes

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        # Sets the build context to the backend directory
        context: DividendTracker/backend
        # Points to the Dockerfile inside that directory
        file: DividendTracker/backend/Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/dividendtracker-backend:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/dividendtracker-backend:${{ github.sha }}
